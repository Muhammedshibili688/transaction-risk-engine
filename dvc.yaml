stages:

  ingestion:
    cmd: python src/components/data/data_ingestion.py
    outs:
      - datas/raw

  data_validation:
    cmd: python src/components/data/data_validation.py
    deps:
      - datas/raw/train_snapshot.jsonl
      - src/components/data/data_validation.py
      - config/schema.yaml
    outs:
      - reports/data_validation/status.yaml

  #  ADD THIS (MISSING LINK)
  feature_engineering:
    cmd: python -c "import shutil; shutil.copy('datas/raw/train_snapshot.jsonl', 'datas/processed/features.jsonl')"
    deps:
      - datas/raw/train_snapshot.jsonl
    outs:
      - datas/processed/features.jsonl

  heuristic_analysis:
    cmd: python src/pipeline/experiment_pipeline.py
    deps:
      - datas/raw/train_snapshot.jsonl
      - config/rules/baseline.yaml
      - src/components/model/scorer.py
    outs:
      - reports/metrics.json:
          cache: false

  scoring:
    cmd: python scoring_runner.py
    deps:
      - datas/processed/features.jsonl
      - config/rules/baseline.yaml
    outs:
      - datas/scoring

  evaluation:
    cmd: python evaluation_runner.py
    deps:
      - datas/processed/features.jsonl
      - datas/scoring
    outs:
      - reports/model_evaluation