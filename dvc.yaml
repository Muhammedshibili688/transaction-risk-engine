stages:
  # STAGE 1: THE DATA BRIDGE
  # This downloads the Gold Snapshot from S3 to datas/raw/
  data_validation:
    cmd: python src/components/data/data_validation.py
    deps:
    - datas/raw/train_snapshot.jsonl
    - src/components/data/data_validation.py
    - src/components/data/data_transformation.py   # Math Dependency
    - config/schema.yaml
    outs:
    - reports/data_validation/status.yaml

  # STAGE 3: BASELINE PERFORMANCE
  # Runs the Heuristic rules on the snapshot to get current precision/recall
  heuristic_analysis:
    cmd: python src/pipeline/experiment_pipeline.py
    deps:
    - datas/raw/train_snapshot.jsonl
    - config/rules/baseline.yaml
    - src/pipeline/experiment_pipeline.py
    - src/components/model/scorer.py
    outs:
    - reports/metrics.json:
        cache: false

  scoring:
    cmd: python scoring_runner.py
    deps:
      - datas/processed/features.jsonl
      - config/rules.yaml
    outs:
      - datas/scoring

  evaluation:
    cmd: python evaluation_runner.py
    deps:
      - datas/processed/features.jsonl
      - datas/scoring
    outs:
      - reports/model_evaluation